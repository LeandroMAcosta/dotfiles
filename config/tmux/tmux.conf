# More comfortable prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse (scroll enters copy-mode instead of going to shell history)
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# Vi mode for copy-mode (select with v, copy with y)
set -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Copy-paste: on mouse release after selecting, copy to macOS clipboard
# Uses copy-pipe-no-clear so the selection remains visible
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"

# Move between panes with Option+arrows (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch windows with Shift+arrows (no prefix)
bind -n S-Left previous-window
bind -n S-Right next-window

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# More intuitive splits
bind | split-window -h
bind - split-window -v

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jabirali/tmux-tilish'

# Tilish config (i3-style)
set -g @tilish-default 'main-vertical'

# Initialize TPM (keep at the end)
run '~/.tmux/plugins/tpm/tpm'

# Override: Alt+Enter always opens vertical split (side by side)
bind -n M-Enter split-window -h -c "#{pane_current_path}"

# Close pane with Alt+Shift+Q
bind -n M-Q kill-pane

# Move panes with Alt+Shift+arrows (swap + re-layout)
bind -n M-S-Left swap-pane -s '{left-of}' \; select-layout -E
bind -n M-S-Right swap-pane -s '{right-of}' \; select-layout -E
bind -n M-S-Up swap-pane -s '{up-of}' \; select-layout -E
bind -n M-S-Down swap-pane -s '{down-of}' \; select-layout -E
