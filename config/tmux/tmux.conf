# Prefijo más cómodo
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse (scroll entra en copy-mode en vez de ir al historial del shell)
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# Moverse entre paneles con Option+flechas (sin prefijo)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Cambiar ventanas con Shift+flechas (sin prefijo)
bind -n S-Left previous-window
bind -n S-Right next-window

# Crear splits más intuitivos
bind | split-window -h
bind - split-window -v

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jabirali/tmux-tilish'

# Tilish config (i3-style)
set -g @tilish-default 'main-vertical'

# Inicializar TPM (dejar al final)
run '~/.tmux/plugins/tpm/tpm'

# Override: Alt+Enter siempre abre split vertical (lado a lado)
bind -n M-Enter split-window -h -c "#{pane_current_path}"

# Mover paneles con Alt+Shift+flechas (swap + re-layout)
bind -n M-S-Left swap-pane -s '{left-of}' \; select-layout -E
bind -n M-S-Right swap-pane -s '{right-of}' \; select-layout -E
bind -n M-S-Up swap-pane -s '{up-of}' \; select-layout -E
bind -n M-S-Down swap-pane -s '{down-of}' \; select-layout -E
